server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/medicina_china?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    time-zone: Europe/Madrid
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  upload-dir: ${APP_UPLOAD_DIR:uploads}
  jwt:
    secret: medicinaChinaJwtSecretKey2026RelaxSeguroClave
    expiration-ms: 7200000
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
